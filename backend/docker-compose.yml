version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USERNAME:-finiq}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finiq_secret}
      POSTGRES_DB:       ${DB_NAME:-finiq_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-finiq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finiq_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finiq_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - finiq_net

  # ── NestJS API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: finiq_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:         production
      DB_HOST:          postgres
      DB_PORT:          5432
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      ML_SERVICE_URL:   http://ml:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - finiq_net

  # ── Python ML Service ────────────────────────────────────────────────────────
  ml:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: finiq_ml
    restart: unless-stopped
    environment:
      ML_API_KEY: ${ML_API_KEY:-ml-internal-key}
      MODEL_DIR:  /app/models
    volumes:
      - ml_models:/app/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - finiq_net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: finiq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - finiq_net

  # ── Bull Board (queue dashboard, dev only) ───────────────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: finiq_bull_board
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3002:3000"
    depends_on:
      - redis
    profiles:
      - dev
    networks:
      - finiq_net

volumes:
  postgres_data:
  redis_data:
  ml_models:

networks:
  finiq_net:
    driver: bridge
